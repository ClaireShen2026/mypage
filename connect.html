<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Connect — Claire Shen</title>

<link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@300;400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

:root{
    --header:#efefec;
    --white:#ffffff;
    --text:#202020;
    --muted:#7a7a7a;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#ffffff;
    font-family:'Inter',sans-serif;
    color:var(--text);
}

/* =========================
   HEADER (MATCH HOMEPAGE EXACTLY)
   ========================= */

header{
    background:var(--header);
}

.nav{
    max-width:1400px;
    margin:0 auto;
    padding:32px 90px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-family:'Newsreader',serif;
    font-size:36px;
}

.logo a{
    text-decoration:none;
    color:inherit;
}

.menu{
    display:flex;
    gap:36px;
}

.menu a{
    text-decoration:none;
    color:#111;
    font-size:16px;
}

/* =========================
   MAIN (UNCHANGED)
   ========================= */

main{
    max-width:600px;
    margin:120px auto;
    padding:0 24px;
}

/* TITLE */
h1{
    font-family:'Newsreader',serif;
    font-size:34px;
    font-weight:400;
    margin-bottom:60px;
}

/* BLOCK */
.block{
    margin-bottom:40px;
}

.label{
    font-size:12px;
    color:var(--muted);
    letter-spacing:0.05em;
    text-transform:uppercase;
    margin-bottom:12px;
}

.value{
    font-size:18px;
    color:#111;
}

.value a{
    color:#111;
    text-decoration:none;
    border-bottom:1px solid #ddd;
    padding-bottom:2px;
}

.value a:hover{
    border-bottom:1px solid #111;
}

/* SOCIAL ROW */
.social-row{
    display:flex;
    align-items:center;
    gap:12px;
}

.avatar{
    width:34px;
    height:34px;
    border-radius:50%;
    object-fit:cover;
    object-position:center;
    flex-shrink:0;
}

/* FOOTER */
footer{
    text-align:center;
    margin-top:120px;
    font-size:12px;
    color:#999;
}

/* MOBILE */
@media(max-width:900px){
    .nav{
        padding:28px 22px;
        flex-direction:column;
        align-items:flex-start;
        gap:14px;
    }

    main{
        margin-top:80px;
    }
}

</style>
</head>

<body>

<header>
<div class="nav">

    <div class="logo">
        <a href="index.html">Claire Shen</a>
    </div>

    <nav class="menu">
        <a href="index.html">journal</a>
        <a href="connect.html">connect</a>
    </nav>

</div>
</header>

<main>

<h1>Connect</h1>

<div class="block">

    <div class="label">Email</div>
    <div class="value">
        <a href="mailto:hello@claire-shen.com">hello@claire-shen.com</a>
    </div>

</div>

<div class="block">

    <div class="label">Xiaohongshu</div>

    <div class="social-row">

        <div class="value">@Claire Space</div>

        <img class="avatar"
             src="images/IMG_2852.jpeg"
             alt="Claire Space">

    </div>

</div>

</main>

<footer>
    © 2026 Claire Shen
</footer>

</body>
</html>
