<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Claire Shen</title>

<style>

:root{
    --paper:#faf8f4;
    --header:#f3f0ea;
    --text:#2f2d2a;
    --muted:#7d7972;
    --border:#e8e4de;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--paper);
    color:var(--text);

    font-family:
    -apple-system,
    BlinkMacSystemFont,
    sans-serif;

    -webkit-font-smoothing:antialiased;
}

/* ---------- HEADER ---------- */

header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:72px;

    background:rgba(243,240,234,.92);

    backdrop-filter:blur(18px);

    border-bottom:1px solid var(--border);

    z-index:999;
}

.nav{
    max-width:1280px;
    margin:auto;
    height:100%;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 48px;
}

.logo{
    font-family:
    Baskerville,
    "Iowan Old Style",
    Palatino,
    serif;

    font-size:26px;
    font-weight:400;

    letter-spacing:-0.02em;

    color:var(--text);
}

.menu{
    display:flex;
    gap:34px;
}

.menu a{
    text-decoration:none;

    color:var(--muted);

    font-size:14px;
    letter-spacing:.02em;

    transition:.2s ease;
}

.menu a:hover{
    color:var(--text);
}

/* ---------- MAIN ---------- */

main{
    max-width:1280px;
    margin:auto;

    padding-top:120px;
    padding-left:48px;
    padding-right:48px;
}

/* ---------- ARTICLE ---------- */

.article{
    display:grid;

    grid-template-columns:
    minmax(400px,700px)
    1fr;

    gap:90px;

    align-items:center;

    margin-bottom:140px;
}

.article-image{
    overflow:hidden;
}

.article-image img{
    width:100%;
    display:block;

    transition:transform .8s ease;
}

.article:hover img{
    transform:scale(1.02);
}

.article-content{
    max-width:460px;
}

.article-date{
    font-size:13px;
    color:var(--muted);

    margin-bottom:18px;

    letter-spacing:.04em;
}

.article-title{
    font-family:
    Baskerville,
    "Iowan Old Style",
    Palatino,
    serif;

    font-size:54px;
    font-weight:400;

    line-height:1.08;

    margin-bottom:24px;
}

.article-title a{
    color:inherit;
    text-decoration:none;
}

.article-title a:hover{
    opacity:.75;
}

.article-excerpt{
    font-size:18px;
    line-height:1.8;

    color:#5f5a55;
}

/* ---------- MOBILE ---------- */

@media(max-width:900px){

    .nav{
        padding:0 24px;
    }

    main{
        padding-left:24px;
        padding-right:24px;
    }

    .article{
        grid-template-columns:1fr;
        gap:32px;
    }

    .article-title{
        font-size:38px;
    }

    .menu{
        gap:18px;
    }
}

</style>
</head>

<body>

<header>

    <div class="nav">

        <div class="logo">
            Claire Shen
        </div>

        <nav class="menu">
            <a href="index.html">Journal</a>
            <a href="about.html">About</a>
            <a href="connect.html">Connect</a>
        </nav>

    </div>

</header>

<main>

    <article class="article">

        <div class="article-image">
            <a href="posts/love-autonomy.html">
                <img src="images/love-autonomy-cover.jpg"
                     alt="Love Used to Move Me">
            </a>
        </div>

        <div class="article-content">

            <div class="article-date">
                June 2026
            </div>

            <h2 class="article-title">
                <a href="posts/love-autonomy.html">
                    Love Used to Move Me
                </a>
            </h2>

            <p class="article-excerpt">
                Autonomy gave me space but not direction.
                Knowing myself turned out to be the beginning,
                not the destination.
            </p>

        </div>

    </article>

</main>

</body>
</html>
