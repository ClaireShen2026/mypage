<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Claire Shen</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>

:root{
    --paper:#fafaf8;
    --header:#efefec;
    --text:#202020;
    --muted:#707070;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    background:var(--paper);
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
}

/* ---------- HEADER ---------- */

header{
    background:var(--header);
    height:130px;
}

.nav{
    max-width:1400px;
    height:100%;

    margin:0 auto;

    padding:0 90px;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-family:'DM Serif Display',serif;
    font-size:58px;
    font-weight:400;
    line-height:1;
    letter-spacing:-0.02em;
}

.logo a{
    text-decoration:none;
    color:inherit;
}

.menu{
    display:flex;
    gap:42px;
}

.menu a{
    text-decoration:none;
    color:var(--text);

    font-size:15px;
    font-weight:400;

    text-transform:lowercase;

    transition:opacity .2s ease;
}

.menu a:hover{
    opacity:.55;
}

/* ---------- MAIN ---------- */

main{
    max-width:1400px;
    margin:85px auto 260px;
    padding:0 90px;
}

/* ---------- FEATURED POST ---------- */

.featured{
    display:grid;

    grid-template-columns:
        340px
        minmax(0, 1fr);

    gap:70px;

    align-items:start;
}

.cover{
    width:100%;
}

.cover img{
    width:100%;
    height:auto;
    display:block;
}

.meta{
    font-size:14px;
    color:var(--muted);

    margin-bottom:22px;

    letter-spacing:.01em;
}

.title{
    font-family:'DM Serif Display',serif;

    font-size:66px;
    font-weight:400;

    line-height:1.02;

    margin-bottom:28px;

    max-width:760px;
}

.title a{
    text-decoration:none;
    color:inherit;
}

.title a:hover{
    opacity:.7;
}

.excerpt{
    max-width:720px;

    font-size:18px;
    line-height:1.9;

    color:#555;
}

/* ---------- FUTURE SPACE ---------- */

.spacer{
    height:520px;
}

/* ---------- MOBILE ---------- */

@media(max-width:1000px){

    header{
        height:auto;
        padding:30px 0;
    }

    .nav{
        padding:0 24px;

        flex-direction:column;
        align-items:flex-start;

        gap:18px;
    }

    .logo{
        font-size:42px;
    }

    .menu{
        gap:22px;
    }

    .menu a{
        font-size:14px;
    }

    main{
        padding:0 24px;
        margin-top:45px;
    }

    .featured{
        grid-template-columns:1fr;
        gap:32px;
    }

    .title{
        font-size:46px;
    }

    .excerpt{
        font-size:16px;
    }
}

</style>
</head>

<body>

<header>

    <div class="nav">

        <div class="logo">
            <a href="index.html">Claire Shen</a>
        </div>

        <nav class="menu">
            <a href="index.html">journal</a>
            <a href="about.html">about</a>
            <a href="connect.html">connect</a>
        </nav>

    </div>

</header>

<main>

    <section class="featured">

        <div class="cover">

            <a href="posts/love-autonomy.html">

                <img
                    src="images/love-autonomy-cover.jpg"
                    alt="Love Used to Move Me">

            </a>

        </div>

        <div>

            <div class="meta">
                journal · june 2026
            </div>

            <h1 class="title">

                <a href="posts/love-autonomy.html">
                    Love Used to Move Me
                </a>

            </h1>

            <div class="excerpt">

                Love used to be the strongest force in my life.
                Strong enough to leave home. Strong enough to search for answers.
                Strong enough to begin imagining a different future.

            </div>

        </div>

    </section>

    <div class="spacer"></div>

</main>

</body>
</html>
