<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Claire Shen</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@300;400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

:root{
    --paper:#fbfbf9;
    --header:#f0f0ed;
    --text:#222;
    --muted:#777;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--paper);
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
}

/* ---------- HEADER ---------- */

header{
    background:var(--header);
}

.nav{
    max-width:1400px;
    margin:0 auto;

    padding:38px 80px;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-family:'Newsreader',serif;
    font-size:42px;
    font-weight:400;
    letter-spacing:-0.03em;
}

.logo a{
    color:inherit;
    text-decoration:none;
}

.menu{
    display:flex;
    gap:34px;
}

.menu a{
    color:#333;
    text-decoration:none;

    font-size:15px;
    font-weight:300;

    text-transform:lowercase;
}

.menu a:hover{
    opacity:.6;
}

/* ---------- CONTENT ---------- */

main{
    max-width:1400px;
    margin:70px auto 240px;
    padding:0 80px;
}

/* ---------- ARTICLE ---------- */

.featured{
    display:grid;
    grid-template-columns:260px 1fr;
    gap:65px;
    align-items:start;
}

.cover img{
    width:100%;
    display:block;
}

.meta{
    font-size:13px;
    color:var(--muted);
    margin-bottom:18px;
}

.title{
    font-family:'Newsreader',serif;
    font-size:48px;
    font-weight:400;
    line-height:1.05;

    max-width:680px;

    margin-bottom:22px;
}

.title a{
    color:inherit;
    text-decoration:none;
}

.title a:hover{
    opacity:.7;
}

.excerpt{
    max-width:600px;

    font-size:16px;
    line-height:1.85;

    color:#555;
}

/* ---------- EMPTY SPACE ---------- */

.spacer{
    height:600px;
}

/* ---------- MOBILE ---------- */

@media(max-width:900px){

    .nav{
        padding:28px 24px;
        flex-direction:column;
        align-items:flex-start;
        gap:18px;
    }

    .logo{
        font-size:34px;
    }

    .menu{
        gap:20px;
    }

    .menu a{
        font-size:14px;
    }

    main{
        padding:0 24px;
        margin-top:40px;
    }

    .featured{
        grid-template-columns:1fr;
        gap:28px;
    }

    .title{
        font-size:38px;
    }
}

</style>
</head>

<body>

<header>

    <div class="nav">

        <div class="logo">
            <a href="index.html">Claire Shen</a>
        </div>

        <nav class="menu">
            <a href="index.html">journal</a>
            <a href="about.html">about</a>
            <a href="connect.html">connect</a>
        </nav>

    </div>

</header>

<main>

    <section class="featured">

        <div class="cover">

            <a href="posts/love-autonomy.html">
                <img src="images/love-autonomy-cover.jpg" alt="Love Used to Move Me">
            </a>

        </div>

        <div>

            <div class="meta">
                journal · june 2026
            </div>

            <h1 class="title">

                <a href="posts/love-autonomy.html">
                    Love Used to Move Me
                </a>

            </h1>

            <div class="excerpt">

                Love used to be the strongest force in my life.
                Strong enough to leave home. Strong enough to search for answers.
                Strong enough to begin imagining a different future.

            </div>

        </div>

    </section>

    <div class="spacer"></div>

</main>

</body>
</html>
