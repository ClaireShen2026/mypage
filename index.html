<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Claire Shen</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@300;400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

:root{
    --header:#efefec;
    --white:#ffffff;
    --text:#202020;
    --muted:#7a7a7a;
    --line:#e5e5e5;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--white);
    color:var(--text);
    font-family:'Inter',sans-serif;
}

/* HEADER */

header{
    background:var(--header);
}

.nav{
    max-width:1400px;
    margin:0 auto;
    padding:32px 90px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-family:'Newsreader',serif;
    font-size:36px;
}

.logo a{
    text-decoration:none;
    color:inherit;
}

.menu{
    display:flex;
    gap:36px;
}

.menu a{
    text-decoration:none;
    color:#111;
    font-size:16px;
}

/* MAIN */

main{
    background:var(--white);
    max-width:1400px;
    margin:60px auto 120px;
    padding:0 90px;
}

/* FEATURED */

.featured{
    display:grid;
    grid-template-columns:360px 1fr;
    gap:72px;
}

.cover img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

.meta{
    font-size:13px;
    color:var(--muted);
    margin-bottom:16px;
}

.title{
    font-family:'Newsreader',serif;
    font-size:30px;
    margin-bottom:18px;
}

.title a{
    text-decoration:none;
    color:inherit;
}

.excerpt{
    font-size:16px;
    line-height:1.9;
    color:#555;
}

.future{
    margin-top:80px;
    font-size:14px;
    color:#888;
}

.spacer{
    height:140px;
}

/* FOOTER */

footer{
    background:var(--white);
    text-align:center;
    padding:30px 0;
    font-size:12px;
    color:#999;
}

/* MOBILE */

@media(max-width:900px){
    .nav{padding:28px 22px; flex-direction:column; align-items:flex-start; gap:14px;}
    main{padding:0 22px;}
    .featured{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<header>
<div class="nav">
    <div class="logo"><a href="index.html">Claire Shen</a></div>
    <nav class="menu">
        <a href="index.html">journal</a>
        <a href="about.html">about</a>
        <a href="connect.html">connect</a>
    </nav>
</div>
</header>

<main>

<section class="featured">

    <div class="cover">
        <a href="posts/beyond-romance.html">
            <img src="images/IMG_1464.jpeg">
        </a>
    </div>

    <div>
        <div class="meta">June 2026</div>
        <h1 class="title">
            <a href="posts/beyond-romance.html">Beyond Romance</a>
        </h1>
        <div class="excerpt">
            A reflection on attachment and direction in life decisions.
        </div>
    </div>

</section>

<div class="future">More articles coming soon.</div>

<div class="spacer"></div>

</main>

<footer>© 2026 Claire Shen</footer>

</body>
</html>
