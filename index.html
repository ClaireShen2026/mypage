<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Claire Shen</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>

:root{
    --bg:#ffffff;
    --text:#111111;
    --muted:#777777;
    --border:#ececec;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
    line-height:1.6;
}

/* ---------- Header ---------- */

header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:72px;

    background:rgba(255,255,255,.96);
    backdrop-filter:blur(12px);

    border-bottom:1px solid var(--border);

    z-index:100;
}

.nav{
    max-width:1200px;
    height:100%;
    margin:auto;

    padding:0 40px;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:15px;
    letter-spacing:.08em;
    font-weight:500;
}

.menu{
    display:flex;
    gap:36px;
}

.menu a{
    text-decoration:none;
    color:var(--text);
    font-size:14px;
    transition:.2s;
}

.menu a:hover{
    opacity:.5;
}

/* ---------- Main ---------- */

main{
    max-width:1200px;
    margin:auto;
    padding-top:120px;
    padding-left:40px;
    padding-right:40px;
}

/* ---------- Article ---------- */

.article{
    display:grid;
    grid-template-columns:1.2fr 1fr;
    gap:80px;

    margin-bottom:120px;
    align-items:center;
}

.article-image{
    overflow:hidden;
}

.article-image img{
    width:100%;
    display:block;

    transition:transform .6s ease;
}

.article:hover img{
    transform:scale(1.03);
}

.article-content{
    max-width:420px;
}

.article-date{
    font-size:13px;
    color:var(--muted);
    margin-bottom:18px;
}

.article-title{
    font-family:Georgia, serif;
    font-size:42px;
    line-height:1.2;
    font-weight:400;
    margin-bottom:20px;
}

.article-title a{
    text-decoration:none;
    color:inherit;
}

.article-title a:hover{
    opacity:.7;
}

.article-excerpt{
    color:#555;
    font-size:17px;
}

/* ---------- Mobile ---------- */

@media(max-width:900px){

    .article{
        grid-template-columns:1fr;
        gap:30px;
    }

    .article-title{
        font-size:30px;
    }

    .menu{
        gap:20px;
    }

}

</style>
</head>

<body>

<header>
    <div class="nav">

        <div class="logo">
            CLAIRE SHEN
        </div>

        <nav class="menu">
            <a href="index.html">Journal</a>
            <a href="about.html">About</a>
            <a href="connect.html">Connect</a>
        </nav>

    </div>
</header>

<main>

    <!-- ARTICLE 1 -->

    <article class="article">

        <div class="article-image">
            <a href="posts/love-autonomy.html">
                <img src="images/love-autonomy-cover.jpg" alt="">
            </a>
        </div>

        <div class="article-content">

            <div class="article-date">
                June 2026
            </div>

            <h2 class="article-title">
                <a href="posts/love-autonomy.html">
                    Love Used to Move Me
                </a>
            </h2>

            <p class="article-excerpt">
                Autonomy gave me space but not direction.
                Knowing myself turned out to be the beginning,
                not the destination.
            </p>

        </div>

    </article>

</main>

</body>
</html>
