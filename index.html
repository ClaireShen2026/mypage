<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Claire Shen</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>

:root{
    --paper:#fafafa;
    --header:#efefed;
    --text:#222222;
    --muted:#666666;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--paper);
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
}

/* ---------- HEADER ---------- */

header{
    background:var(--header);
    height:125px;
}

.nav{
    max-width:1320px;
    height:100%;

    margin:0 auto;

    padding:0 70px;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-family:'EB Garamond',serif;

    font-size:50px;
    font-weight:500;

    letter-spacing:-0.02em;

    color:#1f1f1f;
}

.menu{
    display:flex;
    gap:32px;
}

.menu a{
    text-decoration:none;

    color:#222;

    font-family:'Inter',sans-serif;
    font-size:15px;
    font-weight:400;

    text-transform:lowercase;
}

.menu a:hover{
    opacity:.6;
}

/* ---------- CONTENT ---------- */

main{
    max-width:1320px;

    margin:70px auto 250px;

    padding:0 70px;
}

.featured{
    display:grid;

    grid-template-columns:
        560px
        1fr;

    gap:60px;

    align-items:start;
}

.cover img{
    width:100%;
    display:block;
}

.meta{
    font-size:14px;
    color:var(--muted);

    margin-bottom:22px;
}

.title{
    font-family:'EB Garamond',serif;

    font-size:56px;
    font-weight:400;

    line-height:0.98;

    margin-bottom:24px;
}

.title a{
    color:inherit;
    text-decoration:none;
}

.title a:hover{
    opacity:.75;
}

.excerpt{
    max-width:520px;

    font-size:16px;
    line-height:1.9;

    color:#555;
}

.spacer{
    height:500px;
}

/* ---------- MOBILE ---------- */

@media(max-width:1000px){

    header{
        height:auto;
        padding:32px 0;
    }

    .nav{
        padding:0 24px;

        flex-direction:column;
        align-items:flex-start;

        gap:16px;
    }

    .logo{
        font-size:40px;
    }

    .menu{
        gap:20px;
    }

    .menu a{
        font-size:14px;
    }

    main{
        padding:0 24px;
    }

    .featured{
        grid-template-columns:1fr;
        gap:30px;
    }

    .title{
        font-size:42px;
    }
}

</style>
</head>

<body>

<header>

    <div class="nav">

        <div class="logo">
            Claire Shen
        </div>

        <nav class="menu">
            <a href="index.html">journal</a>
            <a href="about.html">about</a>
            <a href="connect.html">connect</a>
        </nav>

    </div>

</header>

<main>

    <section class="featured">

        <div class="cover">

            <a href="posts/love-autonomy.html">

                <img src="images/love-autonomy-cover.jpg"
                     alt="Love Used to Move Me">

            </a>

        </div>

        <div>

            <div class="meta">
                journal · june 2026
            </div>

            <h1 class="title">

                <a href="posts/love-autonomy.html">
                    Love Used to Move Me
                </a>

            </h1>

            <div class="excerpt">

                Love used to be the strongest force in my life.
                Strong enough to leave home. Strong enough to search
                for answers. Strong enough to begin imagining a different
                future.

            </div>

        </div>

    </section>

    <div class="spacer"></div>

</main>

</body>
</html>
