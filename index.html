<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Claire Shen</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@300;400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

:root{
    --header:#efefec;
    --white:#ffffff;
    --text:#202020;
    --muted:#7a7a7a;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#ffffff;
    font-family:'Inter',sans-serif;
    color:var(--text);
}

/* HEADER (sticky added) */
header{
    background:var(--header);
    position:sticky;
    top:0;
    z-index:1000;
}

.nav{
    max-width:1400px;
    margin:0 auto;
    padding:32px 90px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-family:'Newsreader',serif;
    font-size:36px;
}

.logo a{
    text-decoration:none;
    color:inherit;
}

.menu{
    display:flex;
    gap:36px;
}

.menu a{
    text-decoration:none;
    color:#111;
    font-size:16px;
}

/* MAIN */
main{
    background:#ffffff;
    max-width:1400px;
    margin:60px auto 60px;
    padding:0 90px;
}

/* FEATURED ARTICLE */
.featured{
    display:grid;
    grid-template-columns:360px 1fr;
    gap:72px;
    align-items:start;
    margin-bottom:80px;
}

.cover img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

.meta{
    font-size:13px;
    color:var(--muted);
    margin-bottom:16px;
}

.title{
    font-family:'Newsreader',serif;
    font-size:30px;
    margin-bottom:18px;
}

.title a{
    text-decoration:none;
    color:inherit;
}

.excerpt{
    font-size:16px;
    line-height:1.9;
    color:#555;
}

/* SECOND ARTICLE (same structure) */
.article-card{
    display:grid;
    grid-template-columns:360px 1fr;
    gap:72px;
    align-items:start;
    margin-bottom:40px;
}

.article-card .cover img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

/* FUTURE */
.future{
    margin-top:40px;
    font-size:14px;
    color:#888;
}

/* FOOTER */
footer{
    text-align:center;
    padding:30px 0;
    font-size:12px;
    color:#999;
}

/* MOBILE */
@media(max-width:900px){

    .nav{
        padding:28px 22px;
        flex-direction:column;
        align-items:flex-start;
        gap:14px;
    }

    main{
        padding:0 22px;
    }

    .featured,
    .article-card{
        grid-template-columns:1fr;
        gap:28px;
    }
}

</style>
</head>

<body>

<header>
<div class="nav">

    <div class="logo">
        <a href="index.html">Claire Shen</a>
    </div>

    <nav class="menu">
        <a href="index.html">journal</a>
        <a href="connect.html">connect</a>
    </nav>

</div>
</header>

<main>

<!-- 1st article -->
<section class="featured">

    <div class="cover">
        <a href="posts/beyond-romance.html">
            <img src="images/IMG_1464.jpeg" alt="Beyond Romance">
        </a>
    </div>

    <div>

        <div class="meta">June 1， 2026</div>

        <h1 class="title">
            <a href="posts/beyond-romance.html">Beyond Romance</a>
        </h1>

        <div class="excerpt">
            A reflection on attachment, direction, and the realization that life cannot be fully organized through relationship clarity alone.
        </div>

    </div>

</section>


<!-- 2nd article -->
<section class="article-card">

    <div class="cover">
        <a href="posts/reading.html">
            <img src="images/IMG_6523.jpeg" alt="Reading">
        </a>
    </div>

    <div>

        <div class="meta">June 5, 2026</div>

        <h1 class="title">
            <a href="posts/reading.html">没有人知道我读书的时候，我才开始阅读</a>
        </h1>

        <div class="excerpt">
            我以为自己在寻找书，后来发现我在寻找一种适合自己的精神营养。
        </div>

    </div>

</section>


<div class="future">
    More articles coming soon.
</div>

</main>

<footer>© 2026 Claire Shen</footer>

</body>
</html>
