<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Claire Shen</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@300;400;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

:root{
    --paper:#f9f8f5;
    --header:#efefec;
    --text:#202020;
    --muted:#7a7a7a;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--paper);
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
}

/* ---------- HEADER ---------- */

header{
    background:var(--header);
}

.nav{
    max-width:1400px;
    margin:0 auto;

    padding:32px 90px;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-family:'Newsreader',serif;
    font-size:36px;
    font-weight:400;
    letter-spacing:-0.03em;
}

.logo a{
    color:inherit;
    text-decoration:none;
}

.menu{
    display:flex;
    gap:36px;
}

.menu a{
    color:#111;
    text-decoration:none;

    font-size:16px;
    font-weight:400;
    letter-spacing:-0.01em;

    text-transform:lowercase;
}

.menu a:hover{
    opacity:.6;
}

/* ---------- CONTENT ---------- */

main{
    max-width:1400px;
    margin:50px auto 220px;
    padding:0 90px;
}

/* ---------- FEATURED ARTICLE ---------- */

.featured{
    display:grid;
    grid-template-columns:420px 1fr;
    gap:70px;
    align-items:start;
}

.cover{
    width:100%;
    aspect-ratio:16 / 9;
    overflow:hidden;
}

.cover img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

.meta{
    font-size:13px;
    color:var(--muted);
    margin-bottom:18px;
    letter-spacing:0.01em;
}

.title{
    font-family:'Newsreader',serif;
    font-size:34px;
    font-weight:400;
    line-height:1.15;

    max-width:520px;

    margin-bottom:22px;
}

.title a{
    color:inherit;
    text-decoration:none;
}

.title a:hover{
    opacity:.7;
}

.excerpt{
    max-width:520px;

    font-size:16px;
    line-height:1.9;

    color:#555;
}

/* ---------- SPACE FOR FUTURE ARTICLES ---------- */

.spacer{
    height:650px;
}

/* ---------- MOBILE ---------- */

@media(max-width:900px){

    .nav{
        padding:28px 24px;

        flex-direction:column;
        align-items:flex-start;
        gap:18px;
    }

    .logo{
        font-size:32px;
    }

    .menu{
        gap:22px;
    }

    .menu a{
        font-size:15px;
    }

    main{
        padding:0 24px;
        margin-top:36px;
    }

    .featured{
        grid-template-columns:1fr;
        gap:28px;
    }

    .cover{
        aspect-ratio:16 / 9;
    }

    .title{
        font-size:30px;
    }

    .excerpt{
        font-size:15px;
    }

    .spacer{
        height:300px;
    }
}

</style>
</head>

<body>

<header>

    <div class="nav">

        <div class="logo">
            <a href="index.html">Claire Shen</a>
        </div>

        <nav class="menu">
            <a href="index.html">journal</a>
            <a href="about.html">about</a>
            <a href="connect.html">connect</a>
        </nav>

    </div>

</header>

<main>

    <section class="featured">

        <div class="cover">

            <a href="posts/love-autonomy.html">
                <img src="images/love-autonomy-cover.jpg" alt="Love Used to Move Me">
            </a>

        </div>

        <div>

            <div class="meta">
                journal · june 2026
            </div>

            <h1 class="title">

                <a href="posts/love-autonomy.html">
                    Love Used to Move Me
                </a>

            </h1>

            <div class="excerpt">

                Love used to be the strongest force in my life.
                Strong enough to leave home. Strong enough to search for answers.
                Strong enough to begin imagining a different future.

            </div>

        </div>

    </section>

    <div class="spacer"></div>

</main>

</body>
</html>
