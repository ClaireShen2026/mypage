<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claire Shen</title>

  <style>
    body {
      margin: 0;
      background: #0b0c10;
      color: #e8e6e3;
      font-family: "Helvetica Neue", Arial, sans-serif;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 80px 40px;
    }

    header {
      margin-bottom: 80px;
    }

    .title {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 64px;
      font-weight: 400;
      letter-spacing: -0.02em;
      margin: 0;
    }

    .subtitle {
      margin-top: 20px;
      font-size: 16px;
      color: #a7a7a7;
      max-width: 520px;
      line-height: 1.6;
    }

    .section {
      margin-top: 80px;
    }

    .section-label {
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 30px;
    }

    .featured {
      margin-bottom: 60px;
    }

    .featured a {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 34px;
      color: #fff;
      text-decoration: none;
      line-height: 1.3;
    }

    .featured a:hover {
      opacity: 0.7;
    }

    .meta {
      margin-top: 10px;
      font-size: 13px;
      color: #888;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      margin-top: 40px;
    }

    .post a {
      font-size: 18px;
      color: #e8e6e3;
      text-decoration: none;
      line-height: 1.4;
    }

    .post a:hover {
      opacity: 0.6;
    }

    footer {
      margin-top: 120px;
      font-size: 12px;
      color: #555;
    }

    @media (max-width: 768px) {
      .title { font-size: 42px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

  <div class="container">

    <header>
      <h1 class="title">Claire Shen</h1>
      <div class="subtitle">
        Writing about love, autonomy, identity, and the slow construction of a life.
      </div>
    </header>

    <div class="section">

      <div class="section-label">Featured</div>

      <div class="featured">
        <a href="post.html">
          Love, autonomy, and the beginning of something else
        </a>
        <div class="meta">Essay · 2026</div>
      </div>

      <div class="section-label">Writing</div>

      <div class="grid">

        <div class="post">
          <a href="post.html">
            Love used to be my only compass
          </a>
          <div class="meta">Entry · 2026</div>
        </div>

        <div class="post">
          <a href="post.html">
            Self-understanding doesn’t complete anything
          </a>
          <div class="meta">Note · 2026</div>
        </div>

      </div>

    </div>

    <footer>
      © 2026 · built quietly
    </footer>

  </div>

</body>
</html>
