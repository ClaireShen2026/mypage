<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Claire Shen</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>

:root{
    --paper:#fafafa;
    --header:#f1f1ef;
    --text:#222222;
    --muted:#6d6d6d;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--paper);
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
}

/* ---------- HEADER ---------- */

header{
    background:var(--header);
    height:170px;

    display:flex;
    align-items:center;
}

.nav{
    width:100%;
    max-width:1400px;

    margin:0 auto;

    padding:0 90px;

    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-family:'Cormorant Garamond',serif;

    font-size:72px;
    font-weight:500;

    letter-spacing:-0.03em;

    color:#1f1f1f;
}

.menu{
    display:flex;
    gap:40px;
}

.menu a{
    text-decoration:none;

    color:#222;

    font-family:'Cormorant Garamond',serif;
    font-size:24px;
    font-weight:400;

    transition:.2s;
}

.menu a:hover{
    opacity:.6;
}

/* ---------- MAIN ---------- */

main{
    max-width:1400px;

    margin:90px auto 180px auto;

    padding:0 90px;
}

/* ---------- POST ---------- */

.post{
    display:grid;

    grid-template-columns:
    520px
    1fr;

    gap:70px;

    align-items:start;
}

.post-image img{
    width:100%;
    display:block;
}

.post-meta{
    font-size:18px;
    color:#444;

    margin-bottom:28px;

    font-family:'Cormorant Garamond',serif;
}

.post-title{
    font-family:'Cormorant Garamond',serif;

    font-size:68px;
    line-height:1.05;

    font-weight:500;

    margin-bottom:24px;
}

.post-title a{
    text-decoration:none;
    color:inherit;
}

.post-title a:hover{
    opacity:.75;
}

.post-excerpt{
    max-width:620px;

    font-size:22px;
    line-height:1.8;

    color:#555;
}

/* ---------- FUTURE SPACE ---------- */

.spacer{
    height:400px;
}

/* ---------- MOBILE ---------- */

@media(max-width:1000px){

    header{
        height:auto;
        padding:40px 0;
    }

    .nav{
        padding:0 24px;
        flex-direction:column;
        align-items:flex-start;
        gap:20px;
    }

    .logo{
        font-size:54px;
    }

    .menu{
        gap:24px;
    }

    .menu a{
        font-size:20px;
    }

    main{
        padding:0 24px;
        margin-top:50px;
    }

    .post{
        grid-template-columns:1fr;
        gap:30px;
    }

    .post-title{
        font-size:48px;
    }

    .post-excerpt{
        font-size:18px;
    }
}

</style>
</head>

<body>

<header>

    <div class="nav">

        <div class="logo">
            Claire Shen
        </div>

        <nav class="menu">
            <a href="index.html">journal</a>
            <a href="about.html">about</a>
            <a href="connect.html">connect</a>
        </nav>

    </div>

</header>

<main>

    <article class="post">

        <div class="post-image">

            <a href="posts/love-autonomy.html">

                <img
                    src="images/love-autonomy-cover.jpg"
                    alt="Love Used to Move Me">

            </a>

        </div>

        <div>

            <div class="post-meta">
                musings • 6/1/26
            </div>

            <h1 class="post-title">

                <a href="posts/love-autonomy.html">
                    Love Used to Move Me
                </a>

            </h1>

            <div class="post-excerpt">

                Love used to be the strongest force in my life.
                Strong enough to leave home.
                Strong enough to search for answers.
                Strong enough to begin imagining a different future.

            </div>

        </div>

    </article>

    <div class="spacer"></div>

</main>

</body>
</html>
